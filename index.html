<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product list with cart</title>

    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/main.js" type="module"></script>
</head>
<body>
  <section class="section" aria-labelledby="desserts">
    <div class="section__body container">
      <div class="section__main">
        <div class="section__preview">
          <h1 class="section__title" id="desserts">Desserts</h1>
        </div>
        <ul class="list" data-js-list>
        </ul>
      </div>
      <div class="section__info">
        <div class="cart-empty">
          <div class="cart-empty__preview">
             <p class="cart-empty__item-count">Your Cart(0)</p>
          </div>
          <div class="cart-empty__body">
          <img src="./assets/images/illustration-empty-cart.svg" alt="" class="cart__image">
          <p class="cart-empty__description">Your added items will appear here</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
