<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product list with cart</title>

    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/main.js" type="module"></script>
</head>
<body>
  <section class="section" aria-labelledby="desserts">
    <div class="section__body container">
      <div class="section__main">
        <div class="section__preview">
          <h1 class="section__title" id="desserts">Desserts</h1>
        </div>
        <ul class="list" data-js-list>
        </ul>
      </div>
      <div class="section__info">
        <div class="cart">
          <div class="cart__body">
            <h2 class="cart__body-title">Your Cart(0)</h2>
            <!-- <div class="cart__empty">
              <img src="./assets/images/illustration-empty-cart.svg" alt="">
              <p class="cart__empty-description">Your added items will appear here</p>
            </div> -->
            <div class="cart__full">
              <ul class="cart__list" data-js-cart-list>
                <li class="cart__item">
                  <article class="product-card">
                    <p class="product-card__name">Classic Tiramisu</p>
                    <div class="product-card__details">
                      <div class="product-card__count">1x</div>
                      <div class="product-card__price">$5.50</div>
                      <div class="product-card__total">$28.00</div>
                    </div>
                  </article>
                  <button class="cancel">
                  <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="none" viewBox="0 0 10 10"><path fill="#CAAFA7" d="M8.375 9.375 5 6 1.625 9.375l-1-1L4 5 .625 1.625l1-1L5 4 8.375.625l1 1L6 5l3.375 3.375-1 1Z"/></svg>
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
